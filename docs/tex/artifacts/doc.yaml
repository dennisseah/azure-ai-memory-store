abstract: >
  This paper presents a proposal to leverage Azure AI Foundry Memory Store to
  build a memory platform that meets the requirements of the Cortex team. The
  platform extends the capabilities of Azure AI Foundry Memory Store with
  additional implementation while alleviating its limitations in areas such as
  memory type classification, memory quota, and retrieval mechanisms. By
  building on the existing memory store rather than re-implementing one from
  scratch, we deliver a more targeted and effective platform for managing and
  retrieving different types of memories. We propose a Kubernetes-based
  architecture in which a sidecar pod transparently captures conversations and
  delegates memory processing and storage to the underlying memory store, and a
  retrieval model that pairs a dedicated memory store per application with an
  optional consolidated store, giving agents flexible access to their own and
  shared memories through MCP tools. Security and privacy are first-class
  concerns: the platform incorporates access controls, encryption, and
  compliance measures to protect user data. With safety in mind, we also address
  risks such as memory corruption and poisoning through data validation, access
  controls, and monitoring to prevent unauthorized access or tampering. The
  result is a memory platform that users can trust to manage their memories
  effectively, securely, and safely.
